services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./generated_policies:/app/generated_policies
    env_file: .env

  streamlit:
    build: .
    command: streamlit run streamlit_app/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./generated_policies:/app/generated_policies
    env_file: .env
